<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/icon.png" sizes="any" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <script>
      (function () {
        var CANONICAL_HOST = 'communitybridge.app';
        if (window.location.hostname === 'www.' + CANONICAL_HOST) {
          var target = 'https://' + CANONICAL_HOST + window.location.pathname + window.location.search + window.location.hash;
          window.location.replace(target);
        }
      })();
    </script>
    <title>CommunityBridge – Login</title>
    <meta name="robots" content="noindex" />
    <style>
      :root { --bg:#ffffff; --card:#ffffff; --text:#111827; --muted:#6b7280; --accent:#22c55e; --danger:#ef4444; --line: #e5e7eb; --primary:#2563eb; --subtle:#f8fafc; }
      *{box-sizing:border-box}
      body{margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 42px 18px; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background: var(--bg); color:var(--text);}
      a{color:inherit}
      .wrap{max-width: 520px; width:100%; margin: 0; padding: 0;}
      .logo{display:flex; align-items:center; justify-content:center; margin-bottom: 14px;}
      .logo a{display:flex; width:100%; align-items:center; justify-content:center; text-decoration:none;}
      .logo img{width: min(320px, 100%); height: auto; display:block; margin: 0 auto;}
      .card{background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px;}
      .cardHeader{display:flex; align-items:center; justify-content:space-between; gap: 10px;}
      .cardHeaderLinks{display:flex; gap: 10px; flex-wrap: wrap; justify-content:flex-end;}
      h1{margin:0 0 8px; font-size: 26px}
      p{margin:0 0 14px; color: var(--muted); line-height:1.5}
      label{display:block; font-size: 12px; color: var(--muted); margin: 10px 0 6px}
      input{width:100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; background: #fff; color: var(--text); outline: none;}
      input:focus{border-color: rgba(37,99,235,.55)}
      .row{display:flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; justify-content: flex-start;}
      .btn{display:inline-flex; align-items:center; justify-content:center; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line); text-decoration:none; background: var(--subtle); color: var(--text); cursor: pointer; font-weight: 700;}
      .btnPrimary{background: var(--primary); border-color: var(--primary); color: #fff;}
      .btnDanger{background: rgba(239,68,68,.10); border-color: rgba(239,68,68,.35); color: #991b1b;}
      .btnGoogle{background: var(--subtle); border-color: var(--line);}
      .btnIcon{padding: 10px; width: 44px; height: 40px;}
      .iconSvg{width: 20px; height: 20px; display:block;}
      .iconSvg path{fill: var(--primary);}
      .msg{margin-top: 10px; font-size: 13px; color: var(--muted)}
      .msg.err{color: #fecaca}
      .actionsRow{display:flex; align-items:center; gap: 10px; flex-wrap: wrap; margin-top: 16px;}
      .helperRow{display:flex; gap: 6px; align-items:center; font-size: 13px; color: var(--muted); margin-left: auto;}
      .helperRow a{color: var(--muted); text-decoration:none; border-bottom: 1px solid rgba(15,23,42,0.0)}
      .helperRow a:hover{color: var(--text); border-bottom-color: rgba(15,23,42,0.25)}
      .checkRow{display:flex; justify-content:flex-end; align-items:center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--muted)}
      .checkRow input{width:auto; padding:0; margin:0;}
      .checkLabel{margin:0; cursor:pointer;}
      .pill{display:inline-flex; gap:8px; align-items:center; border:1px solid var(--line); border-radius: 999px; padding: 8px 10px; background: #fff}
      .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; color: var(--muted)}
      .hr{height:1px; background: var(--line); margin: 14px 0}
      .small{font-size: 12px; color: var(--muted)}
      .smallTop{margin-top: 10px;}
      .statusDot{width:10px; height:10px; border-radius:999px; background:var(--accent);}
      .statusTitle{font-weight:800;}
      .rowTop{margin-top: 14px;}
      #signedIn{display:none;}
      .titleCenter { text-align: center; width: 100%; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">
        <a href="/" aria-label="CommunityBridge home">
          <img src="/icon.png" alt="CommunityBridge" />
        </a>
      </div>
      <div class="card">
        <h1 class="titleCenter">Login</h1>

        <div id="signedOut">
          <label for="email">Email</label>
          <input id="email" autocomplete="email" inputmode="email" placeholder="you@example.com" />

          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Password" />

          <div class="checkRow">
            <label class="checkLabel" for="showPassword">Show password</label>
            <input id="showPassword" type="checkbox" />
          </div>

          <div class="actionsRow">
            <button id="btnLogin" class="btn btnPrimary" type="button">Sign in</button>
            <button id="btnGoogle" class="btn btnGoogle btnIcon" type="button" aria-label="Continue with Google">
              <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 11.2v2.9h4.1c-.3 1.8-2 3.1-4.1 3.1-2.4 0-4.4-2-4.4-4.4S9.6 8.4 12 8.4c1.2 0 2.2.5 3 1.2l2-2C15.8 6.4 14 5.5 12 5.5 8 5.5 4.8 8.7 4.8 12.8S8 20.1 12 20.1c4.2 0 7-3 7-7.2 0-.5-.1-1-.2-1.7H12z" />
              </svg>
            </button>
            <button id="btnBiometric" class="btn btnGoogle btnIcon" type="button" aria-label="Sign in with biometrics">
              <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 11c-1.7 0-3 1.3-3 3v3.5c0 .8.7 1.5 1.5 1.5h3c.8 0 1.5-.7 1.5-1.5V14c0-1.7-1.3-3-3-3zm0 2c.6 0 1 .4 1 1v3.5h-2V14c0-.6.4-1 1-1z" />
                <path d="M12 2C7.6 2 4 5.6 4 10v5c0 .6.4 1 1 1s1-.4 1-1v-5c0-3.3 2.7-6 6-6s6 2.7 6 6v5c0 .6.4 1 1 1s1-.4 1-1v-5c0-4.4-3.6-8-8-8z" />
              </svg>
            </button>
            <div class="helperRow">
              <a id="linkSignUp" href="/download">Sign Up</a>
              <span aria-hidden="true">/</span>
              <a id="linkForgot" href="#">Forgot password?</a>
            </div>
          </div>
          <div id="msg" class="msg"></div>

          <div class="hr"></div>
          <div class="small smallTop">
            <a href="/support">Support</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a>
          </div>
        </div>

        <div id="signedIn">
          <div class="pill">
            <div class="statusDot"></div>
            <div>
              <div class="statusTitle">Signed in</div>
              <div id="who" class="mono"></div>
            </div>
          </div>

          <div class="row rowTop">
            <a id="btnWebApp" class="btn btnPrimary" href="#">Continue to web app</a>
            <a id="btnOpenApp" class="btn" href="communitybridge://">Open the mobile app</a>
            <button id="btnLogout" class="btn btnDanger" type="button">Sign out</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
      import {
        getAuth,
        onAuthStateChanged,
        GoogleAuthProvider,
        signInWithEmailAndPassword,
        signInWithPopup,
        signOut,
        sendPasswordResetEmail
      } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';

      // NOTE: Firebase config is not a secret; it identifies your Firebase project.
      // Prefer Firebase Hosting's auto-provided config to avoid drift.
      async function loadFirebaseConfig() {
        try {
          const res = await fetch('/__/firebase/init.json', { cache: 'no-store' });
          if (!res.ok) throw new Error('Firebase init config is unavailable.');
          const json = await res.json();
          if (!json || !json.apiKey || !json.projectId || !json.appId) {
            throw new Error('Firebase init config is incomplete.');
          }
          return json;
        } catch (_) {
          throw new Error('Sign-in is temporarily unavailable. Please try again later.');
        }
      }

      const firebaseConfig = await loadFirebaseConfig().catch((error) => {
        setMsg(error?.message || 'Sign-in is temporarily unavailable.', true);
        throw error;
      });

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const $ = (id) => document.getElementById(id);
      const emailEl = $('email');
      const passEl = $('password');
      const showPasswordEl = $('showPassword');
      const msgEl = $('msg');
      const signedOut = $('signedOut');
      const signedIn = $('signedIn');
      const who = $('who');
      const btnWebApp = $('btnWebApp');
      const btnGoogle = $('btnGoogle');
      const btnBiometric = $('btnBiometric');
      const linkForgot = $('linkForgot');

      // Open the current production app scheme directly.
      const btnOpenApp = $('btnOpenApp');
      if (btnOpenApp) {
        btnOpenApp.addEventListener('click', (e) => {
          e.preventDefault();
          try { window.location.href = 'communitybridge://'; } catch (_) {}
        });
      }

      // IMPORTANT: Firebase Auth state is scoped to the current origin.
      // Keep the browser logged in by redirecting to the web app on the SAME origin.
      const WEB_APP_URL = window.location.origin + '/dashboard';

      function getNextUrl() {
        try {
          const next = new URLSearchParams(window.location.search || '').get('next');
          if (!next) return WEB_APP_URL;

          if (next.startsWith('/')) return window.location.origin + next;
          if (next.startsWith('https://')) return next;
        } catch (_) {
          // ignore
        }
        return WEB_APP_URL;
      }

      const nextUrl = getNextUrl();
      try {
        if (btnWebApp) btnWebApp.href = nextUrl;
      } catch (_) {}

      function setMsg(text, isErr = false) {
        msgEl.textContent = text || '';
        msgEl.className = isErr ? 'msg err' : 'msg';
      }

      showPasswordEl?.addEventListener('change', () => {
        try {
          passEl.type = showPasswordEl.checked ? 'text' : 'password';
        } catch (_) {
          // ignore
        }
      });

      $('btnLogin').addEventListener('click', async () => {
        setMsg('');
        const email = String(emailEl.value || '').trim();
        const password = String(passEl.value || '');
        if (!email || !password) {
          setMsg('Enter email and password.', true);
          return;
        }
        try {
          await signInWithEmailAndPassword(auth, email, password);
          setMsg('');
        } catch (e) {
          setMsg(e?.message || 'Sign-in failed.', true);
        }
      });

      btnGoogle?.addEventListener('click', async () => {
        setMsg('');
        try {
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider);
          setMsg('');
        } catch (e) {
          setMsg(e?.message || 'Google sign-in failed.', true);
        }
      });

      btnBiometric?.addEventListener('click', () => {
        try {
          // Web biometrics/passkeys are not wired up for this project.
          alert('Biometric sign-in is not available on web yet. Please use email/password or Google.');
        } catch (_) {
          // ignore
        }
      });

      linkForgot?.addEventListener('click', async (ev) => {
        try { ev.preventDefault(); } catch (_) {}
        setMsg('');
        const email = String(emailEl.value || '').trim();
        if (!email) {
          setMsg('Enter your email first.', true);
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          setMsg('If an account exists, a reset link has been sent.');
        } catch (e) {
          setMsg(e?.message || 'Reset failed.', true);
        }
      });

      $('btnLogout').addEventListener('click', async () => {
        setMsg('');
        try { await signOut(auth); } catch (_) {}
      });

      onAuthStateChanged(auth, (user) => {
        if (user) {
          signedOut.style.display = 'none';
          signedIn.style.display = 'block';
          who.textContent = `${user.email || '(no email)'}  ·  ${user.uid}`;

          try {
            window.location.replace(nextUrl);
          } catch (_) {
            // ignore
          }
        } else {
          signedIn.style.display = 'none';
          signedOut.style.display = 'block';
          who.textContent = '';
          setMsg('');
        }
      });
    </script>
  </body>
</html>
