name: PR checks

# Lightweight checks that run on every pull request:
#   - install deps (cached)
#   - secret scan (scripts/check-secrets.js)
#   - smoke E2E against the in-memory mock API
#
# These checks are intentionally fast and self-contained so they don't require
# any cloud credentials. EAS / Cloud Run / Firebase Hosting are NOT touched.

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  checks:
    name: Secrets scan + smoke E2E (mock)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Secrets scan
        run: npm run check:secrets

      - name: Start mock API
        # Run in background; the smoke runner expects 127.0.0.1:3006.
        run: |
          nohup npm run api:mock > /tmp/api-mock.log 2>&1 &
          echo $! > /tmp/api-mock.pid
          # Wait until the mock is responsive (max ~15s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3006/api/health > /dev/null 2>&1; then
              echo "mock api ready"
              break
            fi
            sleep 0.5
          done

      - name: Smoke E2E (mock)
        run: npm run smoke:mock

      - name: Upload mock API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-mock-log
          path: /tmp/api-mock.log
          if-no-files-found: ignore

      - name: Stop mock API
        if: always()
        run: |
          if [ -f /tmp/api-mock.pid ]; then
            kill "$(cat /tmp/api-mock.pid)" 2>/dev/null || true
          fi
