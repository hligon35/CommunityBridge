name: Build and submit iOS to TestFlight

on:
  push:
    branches:
      - master
      - test
  workflow_dispatch:
    inputs:
      submit:
        description: 'Set to "true" to submit to TestFlight when manually dispatching'
        required: false
        default: 'false'

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Configure App Store Connect API key
        run: |
          echo "Writing App Store Connect API key file (if provided)"
          if [ -n "${{ secrets.APP_STORE_CONNECT_JSON }}" ]; then
            echo "${{ secrets.APP_STORE_CONNECT_JSON }}" > ./appstore_connect.json
            echo "Wrote ./appstore_connect.json"
          else
            echo "APP_STORE_CONNECT_JSON secret not provided; skipping."
          fi

      - name: Verify Expo/EAS token
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN-}" ]; then
            echo "EAS_TOKEN secret is not set. Exiting."
            exit 1
          fi
          eas whoami

      - name: Build iOS (cloud)
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          eas build --platform ios --profile production --non-interactive

      - name: Submit to TestFlight
        if: ${{ github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.submit == 'true') }}
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          eas submit --platform ios --latest --non-interactive
